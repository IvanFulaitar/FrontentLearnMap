<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Free Frontend — навчальна платформа для вивчення HTML, CSS, JavaScript, TypeScript, React та суміжних інструментів." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Loaded as preload + swap-to-stylesheet-on-load instead of a plain
      <link rel="stylesheet">: a normal stylesheet link blocks first paint
      until the CSS downloads, which Lighthouse flags as a render-blocking
      request. This lets the page render immediately with fallback fonts,
      then swaps in the web fonts once they're ready (display=swap on the
      Google Fonts URL itself also avoids invisible text while the font
      loads). The <noscript> fallback covers users without JavaScript.
    -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      />
    </noscript>
    <title>Free Frontend</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
